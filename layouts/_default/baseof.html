<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:image" content="{{ .Site.Params.ogImage | absURL }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">

  <!-- JSON-LD LocalBusiness structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}",
    "telephone": "{{ .Site.Params.phoneMSPTel }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ .Site.Params.address }}",
      "addressLocality": "{{ .Site.Params.city }}",
      "addressRegion": "{{ .Site.Params.state }}",
      "postalCode": "{{ .Site.Params.zip }}"
    }
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ .Site.Params.favicon | absURL }}">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/fonts.css">
  {{ with resources.Get "css/main.css" }}
    {{ with . | css.TailwindCSS }}
      <link rel="stylesheet" href="{{ .RelPermalink }}">
    {{ end }}
  {{ end }}
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <img src="{{ .Site.Params.logo | absURL }}" alt="Peoria IT logo" width="40" height="40">
      Peoria IT
    </a>
    <a href="tel:{{ .Site.Params.phoneMSPTel }}" class="navbar-contact">{{ .Site.Params.phoneMSP }}</a>
  </nav>

  {{ block "main" . }}{{ end }}

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <nav class="footer-links">
        <a href="/privacy/">Privacy Policy</a>
        <a href="/terms/">Terms &amp; Conditions</a>
        <a href="/sms-sample/">SMS Sample</a>
      </nav>
      <p>&copy; {{ now.Year }} Peoria IT. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
