{{- $parts := split .Inner "---" -}}
{{- $header := index $parts 0 -}}
{{- $items := after 1 $parts -}}
<section class="section section-overlay"{{ with .Get "id" }} id="{{ . }}"{{ end }} style="background-image: url(/images/{{ .Get "image" }});">
  <div class="container">
    <div class="section-header">{{ $header | $.Page.RenderString }}</div>
    <div class="features-3">
      {{- range $items }}
      <div class="feature">{{ . | $.Page.RenderString }}</div>
      {{- end }}
    </div>
  </div>
</section>
