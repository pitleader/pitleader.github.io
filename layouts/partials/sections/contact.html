<section class="section contact"{{ with .id }} id="{{ . }}"{{ end }}>
  <div class="container">
    <div class="section-header">
      <h2 id="{{ .heading | anchorize }}">{{ .heading }}</h2>
    </div>
    <div class="contact-grid">
      {{- range .items }}
      <div class="contact-item">
        <h3 id="{{ .title | anchorize }}">{{ .title }}</h3>
        <p>{{ .body | markdownify }}</p>
      </div>
      {{- end }}
    </div>
  </div>
</section>
